<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1A2332;--dim:#4A5A6B;--ink2:#5C6B7C;--g3:#C9CDD2;--g1:#F2F0EB;--g0:#fff;--accent:#2563A8;}
*{box-sizing:border-box;}
body{margin:0;background:var(--g1);color:var(--ink);font-family:Inter,system-ui,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}
.gate{background:var(--g0);border:1px solid var(--g3);border-top:3px solid var(--accent);width:352px;max-width:92vw;padding:34px 30px 28px;text-align:center;}
.lock{width:38px;height:38px;margin:0 auto 16px;display:block;}
h1{font-weight:600;font-size:19px;margin:0 0 6px;letter-spacing:-.01em;}
p.sub{font-size:13px;color:var(--ink2);margin:0 0 22px;line-height:1.5;}
form{text-align:left;}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink2);margin-bottom:7px;}
input{width:100%;font-family:Inter;font-size:15px;color:var(--ink);background:var(--g0);border:1px solid var(--g3);padding:10px 12px;}
input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
button{margin-top:15px;width:100%;font-family:Inter;font-weight:600;font-size:14px;letter-spacing:.02em;color:var(--g0);background:var(--accent);border:1px solid var(--accent);padding:11px;cursor:pointer;transition:opacity .12s;}
button:hover{opacity:.9;}
.err{font-size:12.5px;color:#B42318;margin-top:12px;min-height:16px;text-align:center;}
</style>
</head>
<body>
<form class="gate" id="g" autocomplete="off">
  <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="#2563A8" stroke-width="1.6" aria-hidden="true">
    <rect x="4.5" y="10.5" width="15" height="10" rx="1.2"/>
    <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/>
    <circle cx="12" cy="15.2" r="1.3" fill="#2563A8" stroke="none"/>
  </svg>
  <h1>Protected document</h1>
  <p class="sub">This page is password-protected. Enter the password to continue.</p>
  <label for="pw">Password</label>
  <input type="password" id="pw" autofocus autocomplete="current-password">
  <button type="submit">Unlock</button>
  <div class="err" id="err"></div>
</form>

function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
async function decrypt(pw){
  var enc=new TextEncoder();
  var km=await crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2u(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(IV)},key,b2u(CT));
  return new TextDecoder().decode(pt);
}
function render(html){document.open();document.write(html);document.close();}
async function tryPw(pw,fromStore){
  try{var html=await decrypt(pw);try{sessionStorage.setItem(SK,pw);}catch(e){}render(html);return true;}
  catch(e){if(!fromStore){document.getElementById("err").textContent="Incorrect password. Try again.";}try{sessionStorage.removeItem(SK);}catch(e2){}return false;}
}
document.getElementById("g").addEventListener("submit",function(e){e.preventDefault();tryPw(document.getElementById("pw").value,false);});
(function(){try{var s=sessionStorage.getItem(SK);if(s){tryPw(s,true);}}catch(e){}})();
